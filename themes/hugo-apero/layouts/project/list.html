{{ define "main" }}
<main class="page-main pa4" role="main">
  <section class="page-content mw8 center">
    
    <header class="mb4">
      <h1 class="f1 mb4">{{ .Title }}</h1>
    </header>

    {{ if .Content }}
      <div class="mb5">
        {{ .Content }}
      </div>
    {{ end }}

    <div class="flex flex-wrap">
      {{ range .Pages }}
        <article class="w-50-l w-100 pr3-l mb4">
          
          {{ with .Params.image }}
            <img src="{{ . | relURL }}" alt="{{ $.Title }}" style="max-width:100%; height:auto; margin-bottom:1rem;">
          {{ end }}

          {{ with .Params.featured }}
            <img src="{{ . | relURL }}" alt="{{ $.Title }}" style="max-width:100%; height:auto; margin-bottom:1rem;">
          {{ end }}

          <h2 class="f4 mt0">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </h2>

          {{ with .Summary }}
            <div class="lh-copy">
              {{ . }}
            </div>
          {{ end }}

        </article>
      {{ end }}
    </div>

  </section>
</main>
{{ end }}
